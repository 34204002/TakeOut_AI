server:
  port: 8080

spring:
  profiles:
    active: dev
  main:
    allow-circular-references: true
  datasource:
    driver-class-name: ${sky.datasource.driver-class-name}
    url: jdbc:mysql://${sky.datasource.host}:${sky.datasource.port}/${sky.datasource.database}?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&useSSL=false&allowPublicKeyRetrieval=true
    username: ${sky.datasource.username}
    password: ${sky.datasource.password}
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      initial-size: 5
      # 连接超时时间
      max-wait: 60000
      # 检测连接是否有效的SQL
      validation-query: SELECT 1
      # 空闲连接验证
      test-while-idle: true
      # 获取连接时检测
      test-on-borrow: false
      # 归还连接时检测
      test-on-return: false
      # 检测间隔
      time-between-eviction-runs-millis: 60000
      # 最小空闲连接数
      min-idle: 5
      # 最大活跃连接数
      max-active: 20
  data:
    redis:
      host: ${sky.redis.host}
      port: ${sky.redis.port}
      password: ${sky.redis.password:}
      database: 0
  ai:
    openai:
      api-key: ${spring.ai.openai.api-key}
      base-url: ${spring.ai.openai.base-url}
      chat:
        options:
          model: ${spring.ai.openai.chat.options.model}
      embedding:
        options:
          model: ${spring.ai.openai.embedding.options.model}
    vectorstore:
      simple:
        initialize-schema: true

mybatis:
  mapper-locations: classpath:mapper/*.xml,classpath:ai/mapper/*.xml
  type-aliases-package: com.sky.entity
  configuration:
    #开启驼峰命名
    map-underscore-to-camel-case: true

logging:
  level:
    com:
      sky:
        mapper: debug
        service: info
        controller: info

sky:
  jwt:
    # 设置jwt签名加密时使用的秘钥
    admin-secret-key: ${sky.jwt.admin-secret-key}
    # 设置jwt过期时间
    admin-ttl: 2000000000
    # 设置前端传递过来的令牌名称
    admin-token-name: token
    # 登录用户令牌
    user-secret-key: ${sky.jwt.user-secret-key}
    # 登录用户令牌过期时间
    user-ttl: 2000000000
    # 登录用户令牌名称
    user-token-name: authentication

  alioss:
    endpoint: ${sky.alioss.endpoint}
    access-key-id: ${sky.alioss.access-key-id}
    access-key-secret: ${sky.alioss.access-key-secret}
    bucket-name: ${sky.alioss.bucket-name}

  wechat:
    appid: ${sky.wechat.appid}
    secret: ${sky.wechat.secret}

